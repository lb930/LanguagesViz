<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Languages Viz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.78);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #14213d 0, var(--bg) 58%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #tree {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: transparent;
    }

    .toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 3;
      display: flex;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .toolbar button {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(30, 41, 59, 0.92);
      color: var(--text);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .toolbar button:hover {
      border-color: rgba(148, 163, 184, 0.42);
      background: rgba(51, 65, 85, 0.96);
    }

    #tooltip {
      position: fixed;
      z-index: 5;
      max-width: 260px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.96);
      color: #f8fafc;
      font-size: 10px;
      line-height: 1.25;
      box-shadow: var(--shadow);
      pointer-events: none;
      opacity: 0;
      transform: translate3d(0, 4px, 0);
      transition: opacity 120ms ease, transform 120ms ease;
      white-space: nowrap;
    }

    #tooltip.visible {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    #tooltip div + div {
      margin-top: 2px;
    }

    #tooltip b {
      color: #cbd5e1;
      font-weight: 600;
    }

    .details {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 3;
      width: min(320px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      font-size: 12px;
      line-height: 1.4;
    }

    .details h1 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .details dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
      margin: 0;
    }

    .details dt {
      color: var(--muted);
    }

    .details dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .swatch {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
      vertical-align: -1px;
      background: var(--swatch, #64748b);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar" aria-label="Zoom controls">
      <button id="zoom-in" type="button" title="Zoom in">+</button>
      <button id="zoom-out" type="button" title="Zoom out">−</button>
      <button id="reset" type="button" title="Reset view">↺</button>
    </div>
    <object id="tree" data="SVGs/european_leaf_labels_only.svg" type="image/svg+xml" aria-label="European Indo-European tree"></object>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    <aside class="details" aria-live="polite">
      <h1>Selected Node</h1>
      <dl>
        <dt>Group</dt>
        <dd id="node-group">Select a node</dd>
        <dt>Family/Language</dt>
        <dd id="node-label">Select a node</dd>
        <dt>Depth</dt>
        <dd id="node-depth">-</dd>
      </dl>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script>
    const objectEl = document.getElementById('tree');
    const zoomInButton = document.getElementById('zoom-in');
    const zoomOutButton = document.getElementById('zoom-out');
    const resetButton = document.getElementById('reset');
    const nodeGroup = document.getElementById('node-group');
    const nodeLabel = document.getElementById('node-label');
    const nodeDepth = document.getElementById('node-depth');
    const tooltip = document.getElementById('tooltip');
    let panZoom = null;

    function readLegendGroups(svgDoc) {
      const groups = new Map();
      svgDoc.querySelectorAll('.legend-swatch').forEach((swatch) => {
        const label = swatch.nextElementSibling;
        const colour = swatch.getAttribute('fill');
        if (colour && label && label.classList.contains('legend-label')) {
          groups.set(colour.toLowerCase(), label.textContent.trim());
        }
      });
      return groups;
    }

    function nodeInfo(el, colourGroups) {
      const colour = (el.dataset.colour || '').toLowerCase();
      return {
        colour,
        group: colourGroups.get(colour) || el.dataset.branchId || 'Unassigned',
        label: el.dataset.label || 'Unknown',
        depth: el.dataset.depth || '-',
      };
    }

    function setSelectedNode(info) {
      nodeGroup.innerHTML = '';
      const swatch = document.createElement('span');
      swatch.className = 'swatch';
      swatch.style.setProperty('--swatch', info.colour || '#64748b');
      nodeGroup.append(swatch, document.createTextNode(info.group));
      nodeLabel.textContent = info.label;
      nodeDepth.textContent = info.depth;
    }

    function setTooltipLine(label, value) {
      const line = document.createElement('div');
      const key = document.createElement('b');
      key.textContent = `${label}: `;
      line.append(key, document.createTextNode(value));
      return line;
    }

    function showTooltip(info, clientX, clientY) {
      tooltip.replaceChildren(
        setTooltipLine('Group', info.group),
        setTooltipLine('Family/Language', info.label),
      );
      tooltip.classList.add('visible');
      tooltip.setAttribute('aria-hidden', 'false');

      const offset = 14;
      const padding = 12;
      const rect = tooltip.getBoundingClientRect();
      let x = clientX + offset;
      let y = clientY + offset;
      if (x + rect.width + padding > window.innerWidth) {
        x = Math.max(padding, clientX - rect.width - offset);
      }
      if (y + rect.height + padding > window.innerHeight) {
        y = Math.max(padding, clientY - rect.height - offset);
      }
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
      tooltip.setAttribute('aria-hidden', 'true');
    }

    function bindNodeInteractions(svgDoc) {
      const colourGroups = readLegendGroups(svgDoc);
      svgDoc.querySelectorAll('[data-node-id]').forEach((el) => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', (event) => {
          event.stopPropagation();
          setSelectedNode(nodeInfo(el, colourGroups));
        });
        el.addEventListener('mouseenter', (event) => {
          showTooltip(nodeInfo(el, colourGroups), event.clientX, event.clientY);
        });
        el.addEventListener('mousemove', (event) => {
          showTooltip(nodeInfo(el, colourGroups), event.clientX, event.clientY);
        });
        el.addEventListener('mouseleave', hideTooltip);
      });
      svgDoc.addEventListener('mouseleave', hideTooltip);
    }

    objectEl.addEventListener('load', () => {
      const svgDoc = objectEl.contentDocument;
      if (!svgDoc) {
        return;
      }
      const svgEl = svgDoc.documentElement;
      panZoom = svgPanZoom(svgEl, {
        controlIconsEnabled: false,
        zoomEnabled: true,
        fit: true,
        center: true,
        minZoom: 0.08,
        maxZoom: 30,
        zoomScaleSensitivity: 0.25,
        dblClickZoomEnabled: false,
        preventMouseEventsDefault: true,
      });
      bindNodeInteractions(svgDoc);
      zoomInButton.addEventListener('click', () => panZoom.zoomIn());
      zoomOutButton.addEventListener('click', () => panZoom.zoomOut());
      resetButton.addEventListener('click', () => {
        panZoom.resetZoom();
        panZoom.center();
        panZoom.fit();
      });
    }, { once: true });
  </script>
</body>
</html>
