<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Languages Viz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.78);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #14213d 0, var(--bg) 58%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #tree {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: transparent;
    }

    .details {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 20;
      width: min(280px, calc(100vw - 24px));
      max-width: calc(100vw - 24px);
      padding: 14px 16px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      font-size: 12px;
      line-height: 1.45;
      pointer-events: auto;
    }

    .details h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .details dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 10px;
      margin: 0;
    }

    .details dt {
      color: var(--muted);
    }

    .details dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 520px) {
      .details {
        top: 10px;
        right: 10px;
        width: min(240px, calc(100vw - 20px));
        max-width: calc(100vw - 20px);
        padding: 12px 13px;
        font-size: 11px;
      }

      .details h1 {
        font-size: 13px;
      }
    }

    .swatch {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
      vertical-align: -1px;
      background: var(--swatch, #64748b);
    }
  </style>
</head>
<body>
  <div id="app">
    <object id="tree" data="SVGs/european_leaf_labels_only.svg" type="image/svg+xml" aria-label="European Indo-European tree"></object>
    <aside class="details" aria-live="polite">
      <h1>Selected Node</h1>
      <dl>
        <dt>Group</dt>
        <dd id="node-group">Select a node</dd>
        <dt>Family/Language</dt>
        <dd id="node-label">Select a node</dd>
        <dt>Depth</dt>
        <dd id="node-depth">-</dd>
      </dl>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script>
    const objectEl = document.getElementById('tree');
    const nodeGroup = document.getElementById('node-group');
    const nodeLabel = document.getElementById('node-label');
    const nodeDepth = document.getElementById('node-depth');
    let panZoom = null;

    function readLegendGroups(svgDoc) {
      const groups = new Map();
      svgDoc.querySelectorAll('.legend-swatch').forEach((swatch) => {
        const label = swatch.nextElementSibling;
        const colour = swatch.getAttribute('fill');
        if (colour && label && label.classList.contains('legend-label')) {
          groups.set(colour.toLowerCase(), label.textContent.trim());
        }
      });
      return groups;
    }

    function nodeInfo(el, colourGroups) {
      const colour = (el.dataset.colour || '').toLowerCase();
      return {
        colour,
        group: colourGroups.get(colour) || el.dataset.branchId || 'Unassigned',
        label: el.dataset.label || 'Unknown',
        depth: el.dataset.depth || '-',
      };
    }

    function setSelectedNode(info) {
      nodeGroup.innerHTML = '';
      const swatch = document.createElement('span');
      swatch.className = 'swatch';
      swatch.style.setProperty('--swatch', info.colour || '#64748b');
      nodeGroup.append(swatch, document.createTextNode(info.group));
      nodeLabel.textContent = info.label;
      nodeDepth.textContent = info.depth;
    }

    function bindNodeInteractions(svgDoc) {
      const colourGroups = readLegendGroups(svgDoc);
      svgDoc.querySelectorAll('[data-node-id]').forEach((el) => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', (event) => {
          event.stopPropagation();
          setSelectedNode(nodeInfo(el, colourGroups));
        });
      });
    }

    objectEl.addEventListener('load', () => {
      const svgDoc = objectEl.contentDocument;
      if (!svgDoc) {
        return;
      }
      const svgEl = svgDoc.documentElement;
      panZoom = svgPanZoom(svgEl, {
        controlIconsEnabled: false,
        zoomEnabled: true,
        fit: true,
        center: true,
        minZoom: 0.08,
        maxZoom: 30,
        zoomScaleSensitivity: 0.25,
        dblClickZoomEnabled: false,
        preventMouseEventsDefault: false,
      });
      bindNodeInteractions(svgDoc);
    }, { once: true });
  </script>
</body>
</html>
