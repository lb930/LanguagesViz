<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Languages Viz</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(15, 23, 42, 0.78);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #14213d 0, var(--bg) 58%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #tree {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: transparent;
    }

    .toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 3;
      display: flex;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .toolbar button {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(30, 41, 59, 0.92);
      color: var(--text);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .toolbar button:hover {
      border-color: rgba(148, 163, 184, 0.42);
      background: rgba(51, 65, 85, 0.96);
    }

    #tooltip {
      position: fixed;
      z-index: 5;
      max-width: 320px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.96);
      color: #f8fafc;
      font-size: 12px;
      line-height: 1.3;
      box-shadow: var(--shadow);
      pointer-events: none;
      opacity: 0;
      transform: translate3d(0, 4px, 0);
      transition: opacity 120ms ease, transform 120ms ease;
      white-space: nowrap;
    }

    #tooltip.visible {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar" aria-label="Zoom controls">
      <button id="zoom-in" type="button" title="Zoom in">+</button>
      <button id="zoom-out" type="button" title="Zoom out">−</button>
      <button id="reset" type="button" title="Reset view">↺</button>
    </div>
    <object id="tree" data="SVGs/european_leaf_labels_only.svg" type="image/svg+xml" aria-label="European Indo-European tree"></object>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script>
    const objectEl = document.getElementById('tree');
    const tooltip = document.getElementById('tooltip');
    const zoomInButton = document.getElementById('zoom-in');
    const zoomOutButton = document.getElementById('zoom-out');
    const resetButton = document.getElementById('reset');
    let panZoom = null;

    function visibleTextContent(el) {
      const texts = Array.from(el.childNodes)
        .filter((node) => node.nodeType === Node.TEXT_NODE)
        .map((node) => node.textContent.trim())
        .filter(Boolean);
      return texts[texts.length - 1] || el.textContent.trim();
    }

    function nodeLabel(el) {
      const title = el.querySelector(':scope > title');
      if (title && title.textContent.trim()) {
        return title.textContent.trim();
      }
      return visibleTextContent(el);
    }

    function showTooltip(text, clientX, clientY) {
      tooltip.textContent = text;
      tooltip.classList.add('visible');
      tooltip.setAttribute('aria-hidden', 'false');
      const offset = 14;
      const padding = 12;
      const rect = tooltip.getBoundingClientRect();
      let x = clientX + offset;
      let y = clientY + offset;
      if (x + rect.width + padding > window.innerWidth) {
        x = Math.max(padding, clientX - rect.width - offset);
      }
      if (y + rect.height + padding > window.innerHeight) {
        y = Math.max(padding, clientY - rect.height - offset);
      }
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
      tooltip.setAttribute('aria-hidden', 'true');
    }

    function bindTooltips(svgDoc) {
      const nodes = svgDoc.querySelectorAll('circle.node, text.label');
      nodes.forEach((el) => {
        const enter = (event) => showTooltip(nodeLabel(el), event.clientX, event.clientY);
        const move = (event) => showTooltip(nodeLabel(el), event.clientX, event.clientY);
        el.addEventListener('mouseenter', enter);
        el.addEventListener('mousemove', move);
        el.addEventListener('mouseleave', hideTooltip);
      });
      svgDoc.addEventListener('mouseleave', hideTooltip);
    }

    objectEl.addEventListener('load', () => {
      const svgDoc = objectEl.contentDocument;
      if (!svgDoc) {
        return;
      }
      const svgEl = svgDoc.documentElement;
      panZoom = svgPanZoom(svgEl, {
        controlIconsEnabled: false,
        zoomEnabled: true,
        fit: true,
        center: true,
        minZoom: 0.08,
        maxZoom: 30,
        zoomScaleSensitivity: 0.25,
        dblClickZoomEnabled: false,
        preventMouseEventsDefault: true,
      });
      bindTooltips(svgDoc);
      zoomInButton.addEventListener('click', () => panZoom.zoomIn());
      zoomOutButton.addEventListener('click', () => panZoom.zoomOut());
      resetButton.addEventListener('click', () => {
        panZoom.resetZoom();
        panZoom.center();
        panZoom.fit();
      });
    }, { once: true });
  </script>
</body>
</html>
